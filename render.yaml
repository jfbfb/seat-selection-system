services:
  - type: web
    name: seat-selection-system
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm run db:seed && npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
